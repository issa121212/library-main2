services:
  postgres:
    image: postgres:16-alpine
    container_name: books-users-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: books_users
      POSTGRES_USER: books
      POSTGRES_PASSWORD: password
    ports:
      - "5333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books -d books_users"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
